name: Feature request
description: Suggest a new tool, CLI flag, or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: Describe the research task this would enable.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A new tool? A new filter/flag? A different output? If it maps to a Terapeak/Seller Hub feature, describe it.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits the project's scope — **read-only** Terapeak research (no account actions)
